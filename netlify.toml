# Netlify build config (repo root). The Next.js app lives in the contractiq/
# subfolder, so `base` points Netlify there; Netlify's Next.js runtime
# auto-detects the App Router and turns route handlers into Netlify Functions.
[build]
  base = "contractiq"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

# Explicitly enable Netlify's Next.js Runtime so App Router SSR pages, API
# route handlers, and middleware are deployed as functions (not static files).
[[plugins]]
  package = "@netlify/plugin-nextjs"
